name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - ExecuteCode
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentBatch
  - SubagentStatus
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - SendMessage
  - ReceiveMessage
  - ReadSharedState
  - WriteSharedState
  - ListSharedState
  - SetCostBudget
  - GetCostStatus
  - GetSessionHealth
  - GetPerformanceReport
  - RegisterHook
  - ListHooks
  - RemoveHook
  - CreateTask
  - UpdateTask
  - ListTasks
  - GetTask
  - AcquireLock
  - ReleaseLock
  - ListLocks
  - BuildCodeIndex
  - QueryCodeIndex
  - Checkpoint
  - Rollback
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  reviewer:
    description: Code review specialist for quality assurance and defect detection.
  architect:
    description: System design and refactoring planning with implementation roadmaps.
